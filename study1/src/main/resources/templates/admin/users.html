<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head><meta charset="UTF-8"/><title>Users</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div th:replace="~{admin/fragments/_admin-topbar}"></div>
<div class="container my-4">
  <div class="row">
    <aside class="col-md-3"><div class="card"><div th:replace="~{admin/fragments/_admin-sidebar}"></div></div></aside>
    <main class="col-md-9">
      <div class="card p-3">
        <h5>Users</h5>
        <table class="table table-striped table-hover">
          <thead><tr><th>ID</th><th>Email</th><th>Role</th><th>Active</th><th></th></tr></thead>
          <tbody>
          <tr th:each="u: ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.email}">email</td>
            <td th:text="${u.role}">ROLE_USER</td>
            <td>
              <span th:text="${u.active} ? 'Yes' : 'No'">Yes</span>
            </td>
            <td>
              <form th:action="@{|/admin/users/${u.id}/toggle|}" method="post" class="d-inline">
                <input type="hidden" name="active" th:value="${!u.active}"/>
                <button class="btn btn-sm" th:classappend="${u.active} ? 'btn-warning' : 'btn-success'"
                        th:text="${u.active} ? 'Khóa' : 'Kích hoạt'">Toggle</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>
</body>
</html>
