<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - MMO Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .brand-title {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
            border-color: #0d6efd;
        }
    </style>
    <meta name="base_url" th:content="@{/}">
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container" style="max-width: 440px;">
    <div class="text-center text-white mb-4">
        <i class="fa-solid fa-cart-shopping fa-2xl"></i>
        <div class="h3 mt-2 brand-title">MMO Market</div>
        <div class="opacity-75">Đăng nhập để tiếp tục</div>
    </div>

    <div class="card p-4">
        <div id="alert" class="alert alert-danger d-none" role="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-3 text-end">
                <a class="link-primary text-decoration-none" th:href="@{/forgot-password}" href="/forgot-password">Quên mật khẩu?</a>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng nhập
                </button>
            </div>
        </form>

        <div class="position-relative my-3">
            <hr class="text-muted">
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">hoặc</span>
        </div>
        <div class="d-grid gap-2">
            <a class="btn btn-outline-danger" th:href="@{/oauth2/authorization/google}" href="/oauth2/authorization/google">
                <i class="fa-brands fa-google me-2"></i>Đăng nhập với Google
            </a>
        </div>
        <div class="text-center mt-3">
            <span class="text-muted">Chưa có tài khoản?</span>
            <a th:href="@{/register}" href="/register">Đăng ký</a>
        </div>
    </div>
    <div class="text-center mt-4 text-white-50 small">
        © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2025</span> MMO Market
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alert');
        alertBox.classList.add('d-none');

        const baseUrl = document.querySelector('meta[name="base_url"]').content;
        const url = baseUrl + 'auth/login';

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            // Chuyển đổi phản hồi thành JSON
            const apiResponse = await response.json();

            if (!response.ok) {
                throw new Error(apiResponse.message || 'Email hoặc mật khẩu không đúng.');
            }

            // Lấy đối tượng chứa token từ trường 'result'
            const loginData = apiResponse.result;

            // Lưu token vào localStorage và cookie
            localStorage.setItem('accessToken', loginData.accessToken);
            localStorage.setItem('refreshToken', loginData.refreshToken);
            
            // Lưu token vào cookie để server có thể đọc được
            document.cookie = `accessToken=${loginData.accessToken}; path=/; max-age=3600; SameSite=Lax`;
            
            // Chuyển hướng về trang chủ
            window.location.href = baseUrl;

        } catch (error) {
            alertBox.textContent = error.message;
            alertBox.classList.remove('d-none');
        }
    }
</script>
</body>
</html>
